<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1C3D; --navy2:#122849; --navy3:#0a1426;
    --sky:#4A9EDB; --sky-dim:#2f6f9e; --gold:#D4AF37; --gold-dim:#9c7d1f;
    --ink:#e8eef7; --muted:#93a4bf; --line:#1e3357;
    --good:#3fbf7f; --bad:#e2615a; --warn:#e8b54a;
    --card:#101f3d; --card2:#0e1b35;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Barlow',system-ui,sans-serif;background:radial-gradient(1200px 600px at 80% -10%, rgba(74,158,219,.10), transparent 60%),radial-gradient(900px 500px at -10% 10%, rgba(212,175,55,.06), transparent 55%),var(--navy3);color:var(--ink);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
  .display{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;line-height:.95}
  a{color:var(--sky);text-decoration:none}
  header.top{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,rgba(11,28,61,.97),rgba(11,28,61,.88));backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:12px;min-width:0}
  .logo .mark{width:42px;height:42px;border-radius:10px;flex:0 0 auto;background:linear-gradient(135deg,var(--sky),var(--navy));border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .logo .mark span{font-family:'Bebas Neue';font-size:24px;color:#fff}
  .logo h1{font-family:'Bebas Neue';font-size:26px;letter-spacing:.05em;line-height:.9}
  .logo .sub{font-size:11px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;font-weight:600}
  .whoami{margin-left:auto;display:flex;align-items:center;gap:10px}
  .whoami input{background:var(--navy2);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:9px;font-family:'Barlow';font-size:14px;width:150px}
  .whoami input:focus{outline:none;border-color:var(--sky)}
  .badge-mbe{font-size:10px;color:var(--muted);border:1px solid var(--line);padding:5px 9px;border-radius:20px;letter-spacing:.1em}
  nav.tabs{max-width:1180px;margin:0 auto;padding:0 14px;display:flex;gap:4px;overflow-x:auto}
  nav.tabs button{border:none;background:transparent;color:var(--muted);font-family:'Barlow Semi Condensed';font-weight:600;font-size:15px;letter-spacing:.03em;padding:13px 16px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:.15s}
  nav.tabs button:hover{color:var(--ink)}
  nav.tabs button.active{color:#fff;border-bottom-color:var(--gold)}
  nav.tabs button .ic{font-size:16px}
  main{max-width:1180px;margin:0 auto;padding:26px 20px 70px}
  .grid{display:grid;gap:16px}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .card h2,.card h3{font-family:'Bebas Neue';letter-spacing:.03em}
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:30px;letter-spacing:.04em;text-transform:uppercase}
  .pill.beg{background:rgba(63,191,127,.14);color:var(--good);border:1px solid rgba(63,191,127,.3)}
  .pill.int{background:rgba(74,158,219,.14);color:var(--sky);border:1px solid rgba(74,158,219,.3)}
  .pill.adv{background:rgba(212,175,55,.14);color:var(--gold);border:1px solid rgba(212,175,55,.3)}
  .pill.t1{background:rgba(63,191,127,.14);color:var(--good)}
  .pill.t2{background:rgba(74,158,219,.14);color:var(--sky)}
  .pill.t3{background:rgba(232,181,74,.14);color:var(--warn)}
  .pill.t4{background:rgba(226,97,90,.14);color:var(--bad)}
  .pill.t5{background:rgba(212,175,55,.16);color:var(--gold);border:1px solid rgba(212,175,55,.4)}
  .pill.cat{background:var(--navy2);color:var(--sky);border:1px solid var(--line)}
  .pill.play{background:rgba(63,191,127,.16);color:var(--good);border:1px solid rgba(63,191,127,.35)}
  .pill.brief{background:var(--navy2);color:var(--muted);border:1px solid var(--line)}
  .btn{font-family:'Barlow Semi Condensed';font-weight:700;letter-spacing:.03em;cursor:pointer;border-radius:10px;padding:11px 18px;font-size:15px;border:1px solid transparent;transition:.15s;display:inline-flex;align-items:center;gap:8px}
  .btn.gold{background:var(--gold);color:#1a1407}.btn.gold:hover{background:#e6c14f}
  .btn.sky{background:var(--sky);color:#04121f}.btn.sky:hover{background:#62b0e8}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}.btn.ghost:hover{border-color:var(--sky);color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .pbar{height:9px;border-radius:20px;background:var(--navy2);overflow:hidden;border:1px solid var(--line)}
  .pbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--gold));transition:width .5s}
  .ring-wrap{display:flex;gap:22px;flex-wrap:wrap;align-items:center}
  .ring{position:relative;width:118px;height:118px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:'Bebas Neue';font-size:30px;color:#fff}
  .row{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);cursor:pointer;transition:.15s}
  .row:hover{border-color:var(--sky);transform:translateY(-1px)}
  .row .num{width:34px;height:34px;border-radius:9px;background:var(--navy2);display:grid;place-items:center;font-family:'Bebas Neue';font-size:18px;color:var(--sky);flex:0 0 auto}
  .row.done .num{background:rgba(63,191,127,.16);color:var(--good)}
  .row .meta{flex:1;min-width:0}
  .row .meta .t{font-weight:600}
  .row .meta .d{font-size:13px;color:var(--muted)}
  .check{font-size:20px;flex:0 0 auto}
  .reader p{margin:0 0 12px;color:#cdd9ec}
  .reader h4{font-family:'Bebas Neue';font-size:20px;color:var(--sky);margin:18px 0 8px;letter-spacing:.03em}
  .callout{border-left:3px solid var(--gold);background:rgba(212,175,55,.07);padding:12px 14px;border-radius:0 10px 10px 0;margin:14px 0}
  .callout.warn{border-color:var(--bad);background:rgba(226,97,90,.07)}
  .callout.sky{border-color:var(--sky);background:rgba(74,158,219,.07)}
  .callout .lbl{font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:4px}
  .callout.warn .lbl{color:var(--bad)} .callout.sky .lbl{color:var(--sky)}
  ul.clean{list-style:none;display:grid;gap:8px;margin:6px 0}
  ul.clean li{padding-left:22px;position:relative;color:#cdd9ec}
  ul.clean li:before{content:"▸";position:absolute;left:0;color:var(--sky)}
  .obj{display:grid;gap:6px;margin:8px 0}
  .obj div{padding-left:24px;position:relative;color:#cdd9ec}
  .obj div:before{content:"◎";position:absolute;left:0;color:var(--gold)}
  .qopt{display:block;width:100%;text-align:left;padding:13px 15px;border:1px solid var(--line);border-radius:11px;background:var(--card2);color:var(--ink);cursor:pointer;margin-bottom:9px;font-size:15px;transition:.12s;font-family:'Barlow'}
  .qopt:hover{border-color:var(--sky)}
  .qopt.correct{border-color:var(--good);background:rgba(63,191,127,.12)}
  .qopt.wrong{border-color:var(--bad);background:rgba(226,97,90,.12)}
  .qopt.dim{opacity:.55}
  .specgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0}
  .spec{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .spec .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:3px}
  .spec .val{font-size:14px;color:#dbe6f5}
  .readings{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:8px 0}
  .reading{background:#0b1830;border:1px solid var(--sky-dim);border-radius:9px;padding:9px 11px;font-family:'Barlow Semi Condensed'}
  .reading .rk{font-size:11px;color:var(--sky);letter-spacing:.08em}
  .reading .rv{font-family:'Bebas Neue';font-size:22px;color:#fff}
  .stepbar{display:flex;gap:6px;margin:6px 0 14px}
  .stepbar i{height:5px;flex:1;border-radius:6px;background:var(--navy2)}
  .stepbar i.on{background:var(--gold)} .stepbar i.cur{background:var(--sky)}
  .tools{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
  .tools span{font-size:12px;background:var(--navy2);border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:#cbd5e1}
  .seg{display:inline-flex;background:var(--navy2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px;flex-wrap:wrap}
  .seg button{border:none;background:transparent;color:var(--muted);font-family:'Barlow Semi Condensed';font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:14px}
  .seg button.on{background:var(--sky);color:#04121f}
  .filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  select,.search{background:var(--navy2);border:1px solid var(--line);color:var(--ink);padding:9px 12px;border-radius:9px;font-family:'Barlow';font-size:14px}
  select:focus,.search:focus{outline:none;border-color:var(--sky)}
  .search{min-width:200px;flex:1}
  .catcount{font-size:13px;color:var(--muted)}
  .es-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .flash{perspective:1000px;height:120px;cursor:pointer}
  .flash .inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
  .flash.flip .inner{transform:rotateY(180deg)}
  .flash .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:12px;display:grid;place-content:center;text-align:center;padding:14px;background:var(--card2)}
  .flash .back{transform:rotateY(180deg);background:linear-gradient(160deg,var(--navy2),var(--card2));border-color:var(--sky)}
  .flash .en{font-family:'Bebas Neue';font-size:24px;letter-spacing:.03em}
  .flash .es{font-family:'Bebas Neue';font-size:26px;color:var(--gold);letter-spacing:.03em}
  .flash .ph{font-size:12px;color:var(--muted);margin-top:5px}
  .flash .cat{position:absolute;top:8px;left:10px;font-size:9px;letter-spacing:.12em;color:var(--sky);text-transform:uppercase}
  .flash.seen .front{border-color:var(--gold-dim)} .flash.seen .front:after{content:"✓ learned";position:absolute;bottom:8px;right:10px;font-size:9px;color:var(--gold);letter-spacing:.1em}
  .flash.tall{height:236px}
  .flash.tall .face{padding:12px 12px 10px}
  .flash.tall .front{gap:2px}
  .rigsvg{width:130px;margin:0 auto}
  .rigback{display:flex;flex-direction:column;justify-content:center;height:100%;gap:10px;text-align:left}
  .rigback .rb-mo{font-size:13px;color:#dbe6f5;line-height:1.35}
  .rigback .rb-me{font-size:13px;color:var(--gold);font-weight:600;border-top:1px solid var(--line);padding-top:8px}
  .back-btn{background:none;border:none;color:var(--sky);font-family:'Barlow Semi Condensed';font-weight:600;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px}
  footer{max-width:1180px;margin:0 auto;padding:26px 20px;text-align:center;font-size:12px;color:var(--muted);border-top:1px solid var(--line)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--gold);color:#1a1407;font-weight:700;font-family:'Barlow Semi Condensed';padding:12px 22px;border-radius:30px;box-shadow:0 12px 30px rgba(0,0,0,.4);transition:transform .35s;z-index:80}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .who-email{font-size:12px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn-signout{padding:6px 12px;font-size:13px}
  table.team{width:100%;border-collapse:collapse;font-size:14px}
  table.team th,table.team td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.team th{font-family:'Barlow Semi Condensed';color:var(--gold);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  table.team td.nm{font-weight:600;white-space:normal}
  table.team td.ov{font-family:'Bebas Neue';font-size:20px;color:var(--sky)}
  .mini-bar{height:6px;border-radius:6px;background:var(--navy2);overflow:hidden;min-width:54px;display:inline-block;vertical-align:middle}
  .mini-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--gold))}
  .auth-wrap{max-width:460px;margin:48px auto}
  @media(max-width:560px){.whoami input{width:110px}.ring{width:96px;height:96px}}
</style>

<script>
/* =====================================================================
   AIR JORDON HVAC — TECHNICIAN DEVELOPMENT ACADEMY  ·  v3
   Fundamentals: 27 lessons (9 per level). Rich schema.
   ===================================================================== */
const LEVELS = ["Beginner","Intermediate","Advanced"];
const FUNDAMENTALS = [
/* ===================== BEGINNER ===================== */
{
  id:"theory", level:"Beginner", icon:"📚", title:"HVAC Theory & How Comfort Works",
  blurb:"What HVAC actually does and the physics behind comfort.",
  objectives:["Define the four jobs of an HVAC system","Explain temperature, humidity, and the comfort zone","Describe the difference between sensible and latent heat"],
  body:[
    {p:"HVAC stands for Heating, Ventilation, and Air Conditioning. The job is to control four things in a space: temperature, humidity, air movement, and air quality. Comfort is a balance of all four — not just a number on a thermostat."},
    {h:"Sensible vs latent heat"},
    {p:"SENSIBLE heat changes temperature (what a thermometer reads). LATENT heat changes moisture (humidity) without changing temperature — it's the energy absorbed or released when water evaporates or condenses. An AC removes both: sensible cooling drops the air temp; latent cooling wrings moisture out at the coil."},
    {h:"The comfort zone"},
    {p:"Most people are comfortable around 70–76°F and 40–60% relative humidity. Too humid feels sticky even when cool; too dry causes static and discomfort. Good HVAC manages both."}
  ],
  diagrams:["Comfort-zone chart (temp vs RH shaded band)","Sensible vs latent heat split on a coil (animation: warm humid air in, cool dry air out + condensate dripping)"],
  knowledge:[{q:"What four things does HVAC control?",a:"Temperature, humidity, air movement, and air quality."},{q:"Which heat type changes moisture, not temperature?",a:"Latent heat."}],
  quiz:[
    {q:"Latent heat is associated with…",a:["Temperature change","Moisture change (humidity)","Voltage","Airflow speed"],c:1},
    {q:"A space that's cool but sticky has a problem with…",a:["Sensible cooling","Latent (humidity) removal","Too much airflow","Low voltage"],c:1},
    {q:"HVAC stands for…",a:["Heat, Vent, Air Control","Heating, Ventilation, Air Conditioning","High Voltage AC","Home Ventilation & Cooling"],c:1}
  ],
  example:"In humid Gulf Coast climates (Houston, Baton Rouge), oversized equipment cools fast but short-cycles before removing enough moisture — the room hits temperature but still feels clammy.",
  mistakes:["Thinking comfort = temperature only, ignoring humidity.","Assuming bigger equipment is better — oversizing hurts dehumidification."],
  tips:["When a customer says 'it's cold but muggy,' think latent capacity and runtime, not just thermostat setting."]
},
{
  id:"cycle", level:"Beginner", icon:"❄️", title:"The Refrigeration Cycle",
  blurb:"The four components every system shares and how heat moves.",
  objectives:["Name and describe the four core components","Explain how refrigerant changes state around the loop","Define superheat and subcooling"],
  body:[
    {p:"Every AC system runs the same vapor-compression cycle around four components. Master it once and you can troubleshoot anything from a window unit to a VRF."},
    {h:"The four components"},
    {ul:["COMPRESSOR — the pump; raises pressure/temperature of vapor. Feed it vapor only.","CONDENSER — rejects heat outdoors; hot vapor condenses to high-pressure liquid.","METERING DEVICE (TXV/orifice) — restriction that drops pressure and boiling point.","EVAPORATOR — absorbs indoor heat; liquid boils to vapor."]},
    {h:"Superheat & subcooling"},
    {p:"SUPERHEAT = degrees the vapor is above saturation at the evaporator outlet (proves all liquid boiled off before the compressor). SUBCOOLING = degrees the liquid is below saturation at the condenser outlet (proves full condensation). These two readings verify a charge."}
  ],
  diagrams:["Closed-loop cycle diagram with state points (animation: refrigerant color shifts hot→cold around the loop)","Pressure-enthalpy (P-h) chart with the four processes labeled"],
  knowledge:[{q:"Which component should never receive liquid?",a:"The compressor."},{q:"Where is superheat measured?",a:"At the evaporator outlet (suction line)."}],
  quiz:[
    {q:"The metering device primarily…",a:["Adds heat","Drops pressure and boiling point","Compresses vapor","Stores refrigerant"],c:1},
    {q:"Subcooling is measured at the…",a:["Evaporator outlet","Condenser outlet (liquid line)","Compressor case","Return air"],c:1},
    {q:"An AC fundamentally…",a:["Creates cold","Moves heat from inside to outside","Destroys heat","Adds humidity"],c:1}
  ],
  example:"On a Daikin VRV in heat mode, a reversing valve swaps the coils — the indoor coil becomes the condenser. Same four components, reversed flow.",
  mistakes:["Believing the system 'makes cold' rather than moving heat.","Confusing pressure with temperature — they only track at saturation."],
  tips:["Picture the loop as a circle: compress → reject heat → expand → absorb heat → repeat."]
},
{
  id:"heat", level:"Beginner", icon:"🌡️", title:"Heat Transfer Principles",
  blurb:"Conduction, convection, radiation — and why heat always moves to cold.",
  objectives:["Describe the three modes of heat transfer","Explain the second law in plain terms","Relate heat transfer to coil and duct design"],
  body:[
    {p:"Heat always flows from warmer to cooler — never the reverse on its own. HVAC works by controlling that flow."},
    {h:"Three modes"},
    {ul:["CONDUCTION — heat through a solid (a hot pipe warming its insulation).","CONVECTION — heat carried by moving fluid/air (a blower moving warm air across a coil).","RADIATION — heat as infrared energy across space (sun load through a window, hot roof)."]},
    {h:"Why it matters"},
    {p:"A coil transfers heat by conduction (refrigerant↔metal) and convection (metal↔air). Dirty coils or low airflow choke that transfer. Building heat gain comes from conduction through walls, convection (infiltration), and radiation (solar) — all sized in a Manual J load calc."}
  ],
  diagrams:["Three-mode illustration (pan on stove = conduction, fan = convection, sun = radiation)","Coil cross-section showing fin-to-air convection"],
  knowledge:[{q:"Which direction does heat naturally flow?",a:"From warmer to cooler."},{q:"A blower moving air across a coil is which mode?",a:"Convection."}],
  quiz:[
    {q:"Heat through a solid metal pipe is…",a:["Convection","Conduction","Radiation","Latent"],c:1},
    {q:"Solar gain through a window is…",a:["Conduction","Convection","Radiation","Evaporation"],c:2},
    {q:"A dirty coil reduces heat transfer by limiting…",a:["Radiation only","Conduction and convection at the fins","Voltage","Refrigerant type"],c:1}
  ],
  example:"On a west-facing retail storefront, late-afternoon solar radiation spikes the cooling load — Manual J accounts for it so the RTU isn't undersized at peak.",
  mistakes:["Ignoring radiant/solar load when diagnosing 'can't keep up' calls in afternoon sun.","Forgetting that low airflow cripples convective transfer at the coil."],
  tips:["'Cold air to a hot space' is really 'heat moving from the hot space into the cold coil.' Frame problems as heat flow."]
},
{
  id:"electrical", level:"Beginner", icon:"⚡", title:"Electrical Basics",
  blurb:"Volts, amps, ohms, Ohm's Law, and AC power.",
  objectives:["Define voltage, current, and resistance","Apply Ohm's Law (V=IR)","Identify common HVAC voltages and phases"],
  body:[
    {p:"HVAC techs work with 24V control and 120/208/240/480V power, single- and three-phase. Understanding the basics keeps you safe and effective."},
    {h:"The three quantities"},
    {ul:["VOLTAGE (V) — electrical pressure, measured across two points.","CURRENT (A) — flow, measured with a clamp around one conductor.","RESISTANCE (Ω) — opposition, measured with power OFF only."]},
    {h:"Ohm's Law & power"},
    {p:"V = I × R. Power (watts) = V × I. A motor drawing high amps at normal voltage is doing more work or struggling against a fault. Three-phase power delivers smoother, more efficient power for larger compressors and motors."}
  ],
  diagrams:["Ohm's Law triangle (V over I and R)","Single-phase vs three-phase sine waves"],
  knowledge:[{q:"How is current measured?",a:"With a clamp meter around a single conductor."},{q:"State Ohm's Law.",a:"Voltage equals current times resistance (V=IR)."}],
  quiz:[
    {q:"Resistance must be measured…",a:["On a live circuit","With power OFF","At full load","Only at 480V"],c:1},
    {q:"Ohm's Law is…",a:["P=VI","V=IR","R=VP","I=VR"],c:1},

function pct(d,t){return t?Math.min(100,Math.round(d/t*100)):0;}

function computeTotals(p){p=p||{};const f=pct(Object.keys(p.modDone||{}).length,FUNDAMENTALS.length);const si=pct(Object.keys(p.simDone||{}).length,DEEP_SIMS.length);const so=pct(Object.keys(p.sopDone||{}).length,SOPS.length);const es=pct(Object.keys(p.esSeen||{}).length,SPANISH.length);const rg=pct(Object.keys(p.rigSeen||{}).length,RIGGING.length);return {f,si,so,es,rg,overall:Math.round((f+si+so+es+rg)/5)};}

function dashboard(){const t=totals();const greet=S.name?`Welcome, ${esc(S.name)}`:"Welcome to the crew";
  const cards=[{k:"Fundamentals",v:t.f,tab:"fundamentals",d:`${Object.keys(S.modDone).length}/${FUNDAMENTALS.length} lessons`},

  const path=[{l:"Apprentice",d:"Fundamentals + Level 1 sims",lv:1},{l:"Junior Tech",d:"Measure & diagnose · Level 2",lv:2},{l:"Service Tech",d:"Multi-symptom · Level 3",lv:3},{l:"Senior Tech",d:"Commercial systems · Level 4",lv:4},{l:"Expert",d:"Critical thinking · Level 5",lv:5}];

    <div class="ring-wrap" style="margin-top:18px">${ring(t.overall)}<div><div class="display" style="font-size:30px;color:var(--gold)">Overall Progress</div><p class="muted" style="margin-top:2px">Work through every section to complete development.</p><button class="btn gold" style="margin-top:12px" data-go="fundamentals">${t.overall?'Keep going':'Start training'} →</button></div></div></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(230px,1fr))">${cards.map(c=>`<div class="card" data-go="${c.tab}" style="cursor:pointer"><div class="display" style="font-size:24px">${c.k}</div><div class="muted" style="font-size:13px;margin-bottom:10px">${c.d}</div><div class="pbar"><i style="width:${c.v}%"></i></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><span class="display" style="font-size:26px;color:var(--sky)">${c.v}%</span><span class="muted" style="font-size:13px">Open →</span></div></div>`).join("")}</div>

let fLevel="Beginner";
function fundamentals(){const list=FUNDAMENTALS.filter(m=>m.level===fLevel);const seg=LEVELS.map(l=>`<button class="${l===fLevel?'on':''}" data-lvl="${l}">${l}</button>`).join("");

  const counts=LEVELS.map(l=>{const ms=FUNDAMENTALS.filter(m=>m.level===l);const dn=ms.filter(m=>S.modDone[m.id]).length;return `${l}: ${dn}/${ms.length}`;}).join(" · ");

function mountQuiz(sel,questions,onDone,next){const mount=$(sel);if(!mount)return;let idx=0,score=0,answered=false;
  function draw(){const q=questions[idx];mount.innerHTML=`<div class="eyebrow">Quiz · ${idx+1} of ${questions.length}</div><h3 style="font-size:22px;margin:6px 0 14px">${esc(q.q)}</h3><div>${q.a.map((o,i)=>`<button class="qopt" data-i="${i}">${esc(o)}</button>`).join("")}</div><div id="why" style="margin-top:8px"></div><div id="qnav" style="margin-top:14px"></div>`;answered=false;mount.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>pick(parseInt(b.dataset.i)));}
  function pick(i){if(answered)return;answered=true;const q=questions[idx];mount.querySelectorAll(".qopt").forEach((b,bi)=>{b.classList.add("dim");if(bi===q.c)b.classList.add("correct");if(bi===i&&i!==q.c)b.classList.add("wrong");});if(i===q.c)score++;const last=idx===questions.length-1;$("#qnav",mount).innerHTML=`<button class="btn sky" id="qnext">${last?'Finish':'Next'} →</button>`;$("#qnext",mount).onclick=()=>{if(last)finish();else{idx++;draw();}};}

    mount.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>pick(parseInt(b.dataset.i)));}
  function pick(i){const st=s.steps[idx];const o=st.options[i];const opts=mount.querySelectorAll(".qopt");
    if(o.correct){opts.forEach((b,bi)=>{b.disabled=true;b.classList.add("dim");if(bi===i){b.classList.remove("dim");b.classList.add("correct");}});$("#cons",mount).innerHTML=`<div class="callout"><div class="lbl">Correct</div>${esc(o.consequence)}</div><button class="btn sky" id="next" style="margin-top:10px">${idx===s.steps.length-1?'See resolution':'Next step'} →</button>`;$("#next",mount).onclick=()=>{if(idx===s.steps.length-1)finish();else{idx++;draw();}};}
    else{opts[i].classList.add("wrong");$("#cons",mount).innerHTML=`<div class="callout warn"><div class="lbl">Wrong Path — Consequence</div>${esc(o.consequence)}</div>`;}}
  function finish(){S.simDone[s.id]=true;save();toast("Simulation complete ✓");mount.innerHTML=`<div class="callout sky"><div class="lbl">Final Repair</div>${esc(s.repair)}</div><div class="callout"><div class="lbl">Customer Explanation</div>${esc(s.customer)}</div><div class="spec" style="margin:14px 0"><div class="k">Documentation Completed</div><div class="val" style="margin-top:4px">${esc(s.documentation)}</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn ghost" id="redo">↻ Run again</button><button class="btn gold" data-back="sims">Back to simulator</button></div>`;$("#redo",mount).onclick=()=>{idx=0;draw();};mount.querySelectorAll("[data-back]").forEach(el=>el.onclick=()=>{route=null;render();});}

function mountEsQuiz(){
  const mount=$("#esQuiz");if(!mount)return;
  const pool=SPANISH.filter(t=>t.level===esLvl);
  let order=pool.slice().sort(()=>Math.random()-0.5).slice(0,Math.min(10,pool.length));
  let idx=0,score=0,answered=false;
  function draw(){
    const t=order[idx];
    // 3 distractors from same level
    const others=pool.filter(x=>x.id!==t.id).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=others.concat([t]).sort(()=>Math.random()-0.5);
    mount.innerHTML=`<div class="eyebrow">Practice · ${idx+1} of ${order.length}</div>
      <h3 style="font-size:24px;margin:6px 0 4px">${esc(t.en)}</h3>
      <p class="muted" style="margin-bottom:12px">Choose the correct Spanish</p>
      <div>${opts.map(o=>`<button class="qopt" data-id="${o.id}">${esc(o.es)}</button>`).join("")}</div>
      <div id="esWhy" style="margin-top:8px"></div><div id="esNav" style="margin-top:14px"></div>`;
    answered=false;
    mount.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>pick(b.dataset.id,t));
  }
  function pick(id,t){
    if(answered)return;answered=true;
    S.esSeen[t.id]=true;save();
    mount.querySelectorAll(".qopt").forEach(b=>{b.classList.add("dim");if(b.dataset.id===t.id)b.classList.add("correct");if(b.dataset.id===id&&id!==t.id)b.classList.add("wrong");b.disabled=true;});
    if(id===t.id)score++;
    $("#esWhy",mount).innerHTML=`<div class="callout ${id===t.id?'':'warn'}"><div class="lbl">${id===t.id?'Correct':t.es}</div><b>${esc(t.es)}</b> — <span class="muted">${esc(t.ph)}</span></div>`;
    const last=idx===order.length-1;
    $("#esNav",mount).innerHTML=`<button class="btn sky" id="esNext">${last?'Finish':'Next'} →</button>`;
    $("#esNext",mount).onclick=()=>{if(last)finish();else{idx++;draw();}};
  }
  function finish(){
    mount.innerHTML=`<div style="text-align:center;padding:10px"><div class="display" style="font-size:54px;color:var(--gold)">${score}/${order.length}</div>
      <p class="muted">${score===order.length?'¡Perfecto! You nailed it.':score>=Math.ceil(order.length*0.6)?'¡Bien! Review the misses and go again.':'Keep practicing — repetition builds it.'}</p>
      <button class="btn ghost" id="esRetry" style="margin-top:10px">↻ New practice set</button></div>`;
    $("#esRetry",mount).onclick=()=>{order=pool.slice().sort(()=>Math.random()-0.5).slice(0,Math.min(10,pool.length));idx=0;score=0;draw();};
  }
  draw();
}

/* ===================== RIGGING / CRANE SIGNALS ===================== */
let rigMode="cards";
function rigHand(type,x,y,dir,col){
  if(type==="none")return"";
  const deg=({up:0,down:180,right:90,left:-90})[dir]||0;
  const rot=str=>`<g transform="rotate(${deg} ${x} ${y})">${str}</g>`;
  const crease="#8ea6cf";
  if(type==="fist"){
    return `<rect x="${x-7}" y="${y-6}" width="14" height="14" rx="5.5" fill="${col}"/>`+
      `<path d="M${x-5},${y-5} h10 M${x-5},${y-1} h10" stroke="${crease}" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>`+
      `<rect x="${x+5}" y="${y-1}" width="4.5" height="7" rx="2.2" fill="${col}" transform="rotate(28 ${x+5} ${y+2})"/>`;
  }
  if(type==="clasp"){
    return `<rect x="${x-11}" y="${y-7}" width="13" height="15" rx="6" fill="${col}"/>`+
      `<rect x="${x-2}" y="${y-7}" width="13" height="15" rx="6" fill="${col}"/>`+
      `<path d="M${x},${y-6} v13" stroke="${crease}" stroke-width="1.2" opacity="0.55"/>`;
  }
  if(type==="point"){
    return rot(
      `<rect x="${x-6}" y="${y-3}" width="12.5" height="13" rx="5" fill="${col}"/>`+            // palm
      `<rect x="${x-5.2}" y="${y-18}" width="4.8" height="16" rx="2.4" fill="${col}"/>`+         // index finger (left of center)
      `<path d="M${x+1},${y-3.5} q1.5,-3 3,0 M${x+4},${y-2.5} q1.4,-2.6 2.8,0" stroke="${crease}" stroke-width="1.1" fill="none" opacity="0.55"/>`+ // curled-finger knuckles
      `<rect x="${x+4}" y="${y+1}" width="7.5" height="4" rx="2" fill="${col}" transform="rotate(32 ${x+4} ${y+3})"/>`  // thumb out to side
    );
  }
  if(type==="thumb"){
    return rot(
      `<rect x="${x-6.5}" y="${y-4.5}" width="13.5" height="13" rx="5" fill="${col}"/>`+          // fist
      `<path d="M${x-4.5},${y-3} h9 M${x-4.5},${y+0.5} h9 M${x-4.5},${y+4} h9" stroke="${crease}" stroke-width="1" stroke-linecap="round" opacity="0.55"/>`+ // folded fingers
      `<rect x="${x-10.5}" y="${y-13}" width="5.4" height="11" rx="2.7" fill="${col}"/>`           // thumb up
    );
  }
  if(type==="open"){
    return rot(
      `<rect x="${x-6.5}" y="${y-2}" width="13" height="11" rx="4" fill="${col}"/>`+              // palm
      [0,1,2,3].map(i=>`<rect x="${(x-5.8+i*3.4).toFixed(1)}" y="${y-14}" width="2.7" height="13" rx="1.35" fill="${col}"/>`).join("")+ // 4 fingers
      `<rect x="${x-10.5}" y="${y}" width="5" height="4" rx="2" fill="${col}" transform="rotate(-28 ${x-10.5} ${y+2})"/>` // thumb
    );
  }
  return"";
}
function rigFig(s){
  const body="#8ea6cf", hand="#eef4fc";
  let g=`<rect x="35" y="39" width="30" height="49" rx="12" fill="${body}"/><circle cx="50" cy="19" r="11" fill="${body}"/>`;
  s.arms.forEach(a=>{const col=a.red?"#e2615a":body;let d="M"+a.pts[0][0]+","+a.pts[0][1];for(let i=1;i<a.pts.length;i++)d+=" L"+a.pts[i][0]+","+a.pts[i][1];g+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>`;});
  s.arms.forEach(a=>{const col=a.red?"#ffd6d2":hand;const h=a.pts[a.pts.length-1];g+=rigHand(a.hand,h[0],h[1],a.dir,col);});
  (s.mov||[]).forEach(mv=>{
    if(mv.t==="circle") g+=`<circle cx="${mv.x}" cy="${mv.y}" r="5.2" fill="none" stroke="#D4AF37" stroke-width="2.3"/><path d="M${mv.x+5.2},${mv.y-2.4} l3.6,2.4 l-3.8,1.9 z" fill="#D4AF37"/>`;
    else if(mv.t==="bf") g+=`<line x1="${mv.x1}" y1="${mv.y1}" x2="${mv.x2}" y2="${mv.y2}" stroke="#D4AF37" stroke-width="2.5" marker-start="url(#ga)" marker-end="url(#ga)"/>`;
    else if(mv.t==="dir") g+=`<line x1="${mv.x1}" y1="${mv.y1}" x2="${mv.x2}" y2="${mv.y2}" stroke="#D4AF37" stroke-width="2.5" marker-end="url(#ga)"/>`;
  });
  const defs=`<defs><marker id="ga" markerWidth="7" markerHeight="7" refX="4" refY="3" orient="auto"><path d="M0,0 L5.5,3 L0,6 z" fill="#D4AF37"/></marker></defs>`;
  return `<svg viewBox="0 0 100 100" width="100%" height="150" preserveAspectRatio="xMidYMid meet">${defs}${g}</svg>`;
}
function rigging(){
  const modeSeg=`<button class="${rigMode==='cards'?'on':''}" data-rigmode="cards">Flashcards</button><button class="${rigMode==='quiz'?'on':''}" data-rigmode="quiz">Test Me</button>`;

      <div><div class="eyebrow">Field Safety · Crane & Rigging</div><h2 style="font-size:30px">Hand Signals</h2></div>
      <div class="seg">${modeSeg}</div>
    </div>
    <div class="filterbar" style="margin-bottom:12px"><span class="catcount">${seen}/${RIGGING.length} signals learned</span></div>
    <div class="callout warn" style="margin-top:0"><div class="lbl">Safety</div>Only one designated signal person directs a lift, and the operator obeys a STOP from anyone. These diagrams are simplified study aids — train against the official ASME B30.5 signal chart and your site's rigging plan.</div>
    ${body}
  </div>`;
}
function mountRigQuiz(){
  const mount=$("#rigQuiz");if(!mount)return;
  const pool=RIGGING.slice();
  let order=pool.slice().sort(()=>Math.random()-0.5).slice(0,Math.min(10,pool.length));
  let idx=0,score=0,answered=false;
  function draw(){
    const t=order[idx];
    const others=pool.filter(x=>x.id!==t.id).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=others.concat([t]).sort(()=>Math.random()-0.5);
    mount.innerHTML=`<div class="eyebrow">Test · ${idx+1} of ${order.length}</div>
      <div style="max-width:200px;margin:6px auto 4px">${rigFig(t)}</div>
      <p style="text-align:center;margin:0 0 6px">${esc(t.motion)}</p>
      <p class="muted" style="text-align:center;margin-bottom:12px">Which signal is this?</p>
      <div>${opts.map(o=>`<button class="qopt" data-id="${o.id}">${esc(o.name)}</button>`).join("")}</div>
      <div id="rigWhy" style="margin-top:8px"></div><div id="rigNav" style="margin-top:14px"></div>`;
    answered=false;mount.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>pick(b.dataset.id,t));
  }
  function pick(id,t){
    if(answered)return;answered=true;S.rigSeen[t.id]=true;save();
    mount.querySelectorAll(".qopt").forEach(b=>{b.classList.add("dim");if(b.dataset.id===t.id)b.classList.add("correct");if(b.dataset.id===id&&id!==t.id)b.classList.add("wrong");b.disabled=true;});
    if(id===t.id)score++;
    $("#rigWhy",mount).innerHTML=`<div class="callout ${id===t.id?'':'warn'}"><div class="lbl">${esc(t.name)}</div>${esc(t.meaning)}</div>`;
    const last=idx===order.length-1;
    $("#rigNav",mount).innerHTML=`<button class="btn sky" id="rigNext">${last?'Finish':'Next'} →</button>`;
    $("#rigNext",mount).onclick=()=>{if(last)finish();else{idx++;draw();}};
  }
  function finish(){
    mount.innerHTML=`<div style="text-align:center;padding:10px"><div class="display" style="font-size:54px;color:var(--gold)">${score}/${order.length}</div>
      <p class="muted">${score===order.length?'Perfect — signal-solid.':score>=Math.ceil(order.length*0.7)?'Good. Review the misses — signals are safety-critical.':'These are life-safety signals — run it again until perfect.'}</p>
      <button class="btn ghost" id="rigRetry" style="margin-top:10px">↻ New test</button></div>`;
    $("#rigRetry",mount).onclick=()=>{order=pool.slice().sort(()=>Math.random()-0.5).slice(0,Math.min(10,pool.length));idx=0;score=0;draw();};
  }
  draw();
}

let route=null;
function render(){renderTabs();const v=$("#view");
  if(route){
    if(route.type==="lesson"){const m=FUNDAMENTALS.find(x=>x.id===route.id);const mi=FUNDAMENTALS.findIndex(x=>x.id===route.id);const nextLesson=mi>=0&&mi<FUNDAMENTALS.length-1?FUNDAMENTALS[mi+1]:null;v.innerHTML=lessonView(m);mountQuiz("#quizMount",m.quiz,sc=>{S.modDone[m.id]=true;S.modScore[m.id]=sc;save();toast("Lesson complete ✓");},nextLesson);wire();return;}
    if(route.type==="sop"){const s=SOPS.find(x=>x.id===route.id);v.innerHTML=sopView(s);wire();return;}
    if(route.type==="sim"){const s=DEEP_SIMS.find(x=>x.id===route.id);v.innerHTML=deepSimView(s);mountSim(s);wire();return;}
  }
  if(tab==="dashboard")v.innerHTML=dashboard();
  else if(tab==="fundamentals")v.innerHTML=fundamentals();
  else if(tab==="sims")v.innerHTML=simsView();
  else if(tab==="sops")v.innerHTML=sops();
  else if(tab==="rigging"){v.innerHTML=rigging();if(rigMode==="quiz"){wire();mountRigQuiz();return;}}
  else if(tab==="spanish"){v.innerHTML=spanish();if(esMode==="quiz"){wire();mountEsQuiz();return;}}
  else if(tab==="admin"){adminView();return;}
  wire();}
function wire(){const v=$("#view");
  v.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{tab=el.dataset.go;route=null;render();window.scrollTo({top:0,behavior:'smooth'});});
  v.querySelectorAll("[data-back]").forEach(el=>el.onclick=()=>{route=null;render();});
  v.querySelectorAll("[data-mod]").forEach(el=>el.onclick=()=>{route={type:"lesson",id:el.dataset.mod};render();window.scrollTo({top:0,behavior:'smooth'});});
  v.querySelectorAll("[data-sop]").forEach(el=>el.onclick=()=>{route={type:"sop",id:el.dataset.sop};render();window.scrollTo({top:0,behavior:'smooth'});});
  v.querySelectorAll("[data-scen]").forEach(el=>el.onclick=()=>{const s=ALL_SCEN.find(x=>x.id===el.dataset.scen);route={type:"sim",id:s.simId};render();window.scrollTo({top:0,behavior:'smooth'});});
  v.querySelectorAll("[data-lvl]").forEach(el=>el.onclick=()=>{fLevel=el.dataset.lvl;render();});
  v.querySelectorAll("[data-slv]").forEach(el=>el.onclick=()=>{simLevel=parseInt(el.dataset.slv);render();});
  v.querySelectorAll("[data-simlevel]").forEach(el=>el.onclick=()=>{tab="sims";simLevel=parseInt(el.dataset.simlevel);route=null;render();window.scrollTo({top:0,behavior:'smooth'});});
  v.querySelectorAll("[data-eslvl]").forEach(el=>el.onclick=()=>{esLvl=el.dataset.eslvl;esEnsureCat();render();});
  v.querySelectorAll("[data-rigmode]").forEach(el=>el.onclick=()=>{rigMode=el.dataset.rigmode;render();});
  v.querySelectorAll("[data-rig]").forEach(el=>el.onclick=()=>{el.classList.toggle("flip");const k=el.dataset.rig;if(!S.rigSeen[k]){S.rigSeen[k]=true;save();}});
  v.querySelectorAll("[data-esmode]").forEach(el=>el.onclick=()=>{esMode=el.dataset.esmode;render();});
  v.querySelectorAll("[data-escat]").forEach(el=>el.onclick=()=>{esCat=el.dataset.escat;render();});
  v.querySelectorAll("[data-es]").forEach(el=>el.onclick=()=>{el.classList.toggle("flip");const k=el.dataset.es;if(!S.esSeen[k]){S.esSeen[k]=true;save();}});
  v.querySelectorAll("[data-rev]").forEach(el=>el.onclick=()=>{const t=$("#"+el.dataset.rev);if(t)t.style.display=t.style.display==="none"?"block":"none";});
  const cs=$("#catSel");if(cs)cs.onchange=()=>{simCat=cs.value;render();};
  const ss=$("#simSearch");if(ss)ss.oninput=()=>{simSearch=ss.value;render();const e=$("#simSearch");if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}};
  const sd=$("#sopDone");if(sd)sd.onclick=()=>{const id=route.id;if(S.sopDone[id])delete S.sopDone[id];else{S.sopDone[id]=true;toast("Marked reviewed ✓");}save();render();};}

/* ===================== ADMIN DASHBOARD ===================== */
async function adminView(){
  const v=$("#view");
  v.innerHTML=`<div class="card"><div class="eyebrow">Admin · Team Progress</div><h2 style="font-size:30px;margin-bottom:6px">Technician Completion</h2><p class="muted">Loading team progress…</p></div>`;
  let data=null,error=null,al=null,aerr=null;
  try{ const r=await sb.from("academy_progress").select("email,name,progress,updated_at").order("updated_at",{ascending:false}); data=r.data; error=r.error; }catch(e){ error=e; }
  try{ const r=await sb.from("academy_allowlist").select("email,created_at").order("email",{ascending:true}); al=r.data; aerr=r.error; }catch(e){ aerr=e; }
  if(error){ v.innerHTML=`<div class="card"><div class="eyebrow">Admin</div><h2 style="font-size:28px;margin-bottom:6px">Team Progress</h2><div class="callout warn"><div class="lbl">Couldn't load</div>${esc(error.message||String(error))}</div></div>`; return; }
  const rows=(data||[]).map(r=>{const t=computeTotals(r.progress||{});return {name:(r.name||"").trim()||"—",email:r.email||"—",t,updated:r.updated_at};});
  const teamAvg=rows.length?Math.round(rows.reduce((a,r)=>a+r.t.overall,0)/rows.length):0;
  const fmt=d=>{if(!d)return"—";const dt=new Date(d),now=new Date(),diff=(now-dt)/86400000;if(diff<1)return"today";if(diff<2)return"yesterday";if(diff<30)return Math.floor(diff)+"d ago";return dt.toLocaleDateString();};
  const bar=p=>`<span class="mini-bar"><i style="width:${p}%"></i></span> ${p}%`;
  const body=rows.length?rows.map(r=>`<tr>
    <td class="nm">${esc(r.name)}</td>
    <td><span class="muted" style="font-size:12px">${esc(r.email)}</span></td>
    <td class="ov">${r.t.overall}%</td>
    <td>${bar(r.t.f)}</td><td>${bar(r.t.si)}</td><td>${bar(r.t.so)}</td><td>${bar(r.t.rg)}</td><td>${bar(r.t.es)}</td>
    <td><span class="muted" style="font-size:12px">${fmt(r.updated)}</span></td>
  </tr>`).join(""):`<tr><td colspan="9" class="muted" style="padding:18px">No technicians have signed in yet.</td></tr>`;
  const alList=(al||[]).map(r=>`<tr><td class="nm">${esc(r.email)}</td><td style="text-align:right"><button class="btn ghost" data-del-allow="${esc(r.email)}" style="padding:5px 11px;font-size:12px">Remove</button></td></tr>`).join("")||`<tr><td colspan="2" class="muted" style="padding:14px">No one approved yet. Add a technician's email below.</td></tr>`;
  const allowPanel=aerr?`<div class="callout warn"><div class="lbl">Couldn't load approvals</div>${esc(aerr.message||String(aerr))}</div>`:`
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <input id="allowEmail" class="search" style="flex:1;min-width:200px" placeholder="tech@example.com" type="email" autocomplete="off"/>
        <button class="btn gold" id="allowAdd">Approve</button>
      </div>
      <table class="team"><tbody>${alList}</tbody></table>`;
  v.innerHTML=`<div class="grid" style="gap:16px">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div><div class="eyebrow">Admin · Team Progress</div><h2 style="font-size:30px">Technician Completion</h2></div>
        <button class="btn ghost" id="adminRefresh">↻ Refresh</button>
      </div>
      <div class="ring-wrap" style="margin-top:14px">
        <div><div class="display" style="font-size:46px;color:var(--gold)">${rows.length}</div><div class="muted">technicians enrolled</div></div>
        <div style="margin-left:20px"><div class="display" style="font-size:46px;color:var(--sky)">${teamAvg}%</div><div class="muted">team average completion</div></div>
      </div>
    </div>
    <div class="card">
      <div class="eyebrow">Admin · Access Control</div>
      <h2 style="font-size:26px;margin-bottom:4px">Approved Technicians</h2>
      <p class="muted" style="margin-bottom:12px">Only emails on this list can request a sign-in link and use the Academy. Add a tech's work email to approve them; remove to revoke access.</p>
      ${allowPanel}
    </div>
    <div class="card" style="overflow-x:auto">
      <div class="eyebrow">Completion detail</div>
      <table class="team">
        <thead><tr><th>Technician</th><th>Email</th><th>Overall</th><th>Fund.</th><th>Sims</th><th>SOPs</th><th>Rigging</th><th>Español</th><th>Last active</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>
  </div>`;
  const rf=$("#adminRefresh");if(rf)rf.onclick=()=>adminView();
  const addBtn=$("#allowAdd");
  if(addBtn)addBtn.onclick=async()=>{
    const ie=$("#allowEmail"),em=(ie.value||"").trim().toLowerCase();
    if(!em||em.indexOf("@")<1){toast("Enter a valid email");return;}
    addBtn.disabled=true;addBtn.textContent="Adding…";
    let err=null;try{ const r=await sb.from("academy_allowlist").upsert({email:em},{onConflict:"email"}); err=r.error; }catch(e){ err=e; }
    addBtn.disabled=false;addBtn.textContent="Approve";
    if(err){toast("Error: "+(err.message||err));return;}
    toast("Approved ✓");adminView();
  };
  const ie2=$("#allowEmail");if(ie2)ie2.addEventListener("keydown",e=>{if(e.key==="Enter"&&addBtn)addBtn.click();});
  v.querySelectorAll("[data-del-allow]").forEach(b=>b.onclick=async()=>{
    const em=b.dataset.delAllow;
    let err=null;try{ const r=await sb.from("academy_allowlist").delete().eq("email",em); err=r.error; }catch(e){ err=e; }
    if(err){toast("Error: "+(err.message||err));return;}
    toast("Access removed");adminView();
  });
}

/* ===================== AUTH SCREENS & FLOW ===================== */
function showLoading(msg){nav.innerHTML="";$("#authArea").innerHTML="";nameInput.style.display="none";$("#view").innerHTML=`<div class="auth-wrap"><div class="card" style="text-align:center"><div class="display" style="font-size:28px;color:var(--gold)">${esc(msg||"Loading…")}</div></div></div>`;}
function showLogin(msg){
  nav.innerHTML="";$("#authArea").innerHTML="";nameInput.style.display="none";
  $("#view").innerHTML=`<div class="auth-wrap"><div class="card">
    <div class="eyebrow">Air Jordon HVAC · Academy</div>
    <h2 style="font-size:32px;margin:6px 0 10px">Sign in</h2>
    <p class="muted" style="margin-bottom:16px">Enter your work email and we'll send a one-tap sign-in link — no password to remember. Your training progress is saved to your account and follows you across devices.</p>
    <input id="loginEmail" class="search" style="width:100%;margin-bottom:10px" placeholder="you@airjordonhvac.com" type="email" autocomplete="email"/>
    <button class="btn gold" id="loginBtn" style="width:100%;justify-content:center">Send my sign-in link</button>
    <div id="loginMsg" style="margin-top:14px">${msg||""}</div>
  </div></div>`;
  const go=()=>sendMagicLink();
  $("#loginBtn").onclick=go;
  const inp=$("#loginEmail");inp.focus();inp.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
}
async function sendMagicLink(){
  const inp=$("#loginEmail"),email=(inp.value||"").trim().toLowerCase();
  const msg=$("#loginMsg");
  if(!email||email.indexOf("@")<1){msg.innerHTML=`<div class="callout warn"><div class="lbl">Check email</div>Please enter a valid email address.</div>`;return;}
  const btn=$("#loginBtn");btn.disabled=true;btn.textContent="Checking…";
  // Admin-approval gate: only approved emails may receive a sign-in link
  let allowed=false,gateErr=null;
  try{ const r=await sb.rpc("academy_email_allowed",{p_email:email}); if(r.error)gateErr=r.error; else allowed=!!r.data; }catch(e){gateErr=e;}
  if(gateErr){btn.disabled=false;btn.textContent="Send my sign-in link";msg.innerHTML=`<div class="callout warn"><div class="lbl">Couldn't verify access</div>${esc(gateErr.message||String(gateErr))}</div>`;return;}
  if(!allowed){btn.disabled=false;btn.textContent="Send my sign-in link";msg.innerHTML=`<div class="callout warn"><div class="lbl">Not approved yet</div>This email hasn't been approved for the Academy. Ask your administrator to add you, then try again.</div>`;return;}
  btn.textContent="Sending…";
  let error=null;
  try{ const r=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.origin+window.location.pathname}}); error=r.error; }catch(e){ error=e; }
  btn.disabled=false;btn.textContent="Send my sign-in link";
  if(error){msg.innerHTML=`<div class="callout warn"><div class="lbl">Couldn't send</div>${esc(error.message||String(error))}</div>`;return;}
  msg.innerHTML=`<div class="callout sky"><div class="lbl">Check your email</div>We sent a sign-in link to <b>${esc(email)}</b>. Open it on this device to finish signing in. The link expires shortly, so use it soon.</div>`;
}
function showApp(){
  nameInput.style.display="";nameInput.value=S.name||"";
  $("#authArea").innerHTML=`<span class="who-email" title="${esc(AUTH.email)}">${esc(AUTH.email)}</span><button class="btn ghost btn-signout" id="signOutBtn">Sign out</button>`;
  const so=$("#signOutBtn");if(so)so.onclick=async()=>{try{await sb.auth.signOut();}catch(e){}};
  tab="dashboard";route=null;render();
}
function showPending(){
  nav.innerHTML="";nameInput.style.display="none";
  $("#authArea").innerHTML=`<button class="btn ghost btn-signout" id="signOutP">Sign out</button>`;
  const so=$("#signOutP");if(so)so.onclick=async()=>{try{await sb.auth.signOut();}catch(e){}};
  $("#view").innerHTML=`<div class="auth-wrap"><div class="card">
    <div class="eyebrow">Air Jordon HVAC · Academy</div>
    <h2 style="font-size:30px;margin:6px 0 10px">Awaiting approval</h2>
    <p class="muted">Your email <b>${esc(AUTH?AUTH.email:"")}</b> isn't approved for the Academy yet. Your administrator needs to add you to the approved technician list. Once they do, reload this page to get in.</p>
    <button class="btn gold" id="reloadP" style="margin-top:14px;width:100%;justify-content:center">I've been approved — reload</button>
  </div></div>`;
  const rb=$("#reloadP");if(rb)rb.onclick=()=>location.reload();
}
async function onAuthed(user){
  AUTH={id:user.id,email:(user.email||"").toLowerCase()};
  isAdmin=ADMIN_EMAILS.indexOf(AUTH.email)>=0;
  showLoading("Checking access…");
  if(!isAdmin){
    let ok=false;
    try{ const r=await sb.rpc("academy_email_allowed",{p_email:AUTH.email}); ok=!!r.data; }catch(e){ ok=false; }
    if(!ok){ showPending(); return; }
  }
  showLoading("Loading your progress…");
  const remote=await loadRemote();
  if(remote&&remote.progress&&Object.keys(remote.progress).length){
    S=Object.assign({},dflt,remote.progress);
  }else{
    // first sign-in: keep any local progress on this device and push it up
    S=load();
    await saveRemote();
  }
  showApp();
}
async function boot(){
  if(!sb){
    nav.innerHTML="";$("#authArea").innerHTML="";nameInput.style.display="none";
    $("#view").innerHTML=`<div class="auth-wrap"><div class="card"><div class="eyebrow">Setup needed</div><h2 style="font-size:26px;margin:6px 0 8px">Sign-in not configured yet</h2><p class="muted">The Supabase connection key hasn't been set in this build. Once it's added, magic-link sign-in and cloud progress will be active.</p></div></div>`;
    return;
  }
  showLoading("Loading…");
  try{
    const {data}=await sb.auth.getSession();
    if(data&&data.session&&data.session.user){ await onAuthed(data.session.user); }
    else { showLogin(); }
  }catch(e){ showLogin(); }
  sb.auth.onAuthStateChange((evt,sess)=>{
    if(evt==="SIGNED_IN"&&sess&&sess.user&&!AUTH){ onAuthed(sess.user); }
    else if(evt==="SIGNED_OUT"){ AUTH=null;isAdmin=false;S=Object.assign({},dflt);showLogin(); }
  });
}
boot();

</script>
